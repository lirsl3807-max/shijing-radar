# 学术雷达 — 自动搜索 & GitHub Pages 部署
# ===========================================
# 定时任务：每周一早上 8:00（北京时间）运行搜索
# 手动触发：在 GitHub Actions 页面点击 "Run workflow"

name: 学术雷达

on:
  schedule:
    # 北京时间每周一 08:00 → UTC 时间每周日 00:00
    - cron: "0 0 * * 0"
  workflow_dispatch:  # 支持手动触发

# 权限：允许推送代码
permissions:
  contents: write

# 同一时间只跑一个工作流
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── 搜索并更新文献数据 ──────────────────────────────
  search:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: 编译 cnki-search
        run: |
          go install github.com/ExquisiteCore/cnki-search/cmd/cnki@latest
          echo "cnki 安装路径: $(which cnki)"

      - name: 运行雷达搜索
        id: search
        run: |
          python3 radar.py 2>&1 | tee radar_output.txt

      - name: 提交更新数据到 main 分支
        run: |
          git config user.name "学术雷达 Bot"
          git config user.email "radar-bot@shijing.dev"
          git add data/academic_radar_data.json
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M")
          git commit -m "🔄 学术雷达自动更新 — ${TIMESTAMP}" || echo "数据无变化，跳过提交"
          git push
